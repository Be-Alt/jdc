<main class="flex min-h-screen items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
  <section
    class="w-full max-w-xl rounded-[2rem] border border-slate-200/80 bg-white/90 p-8 shadow-[0_30px_80px_-30px_rgba(15,23,42,0.35)] backdrop-blur sm:p-10"
  >
    <div class="space-y-6">
      <div class="inline-flex items-center gap-3 rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-sm font-medium text-slate-700">
        <span class="h-2.5 w-2.5 rounded-full bg-sky-500"></span>
        Retour de connexion
      </div>

      <div class="space-y-3">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-950">
          Finalisation de l’authentification
        </h1>

        @if (statusMessage) {
          <p class="text-base leading-7 text-slate-600">
            {{ statusMessage }}
          </p>
        }

        @if (errorMessage) {
          <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
            {{ errorMessage }}
          </div>
        }
      </div>

      @if (!errorMessage) {
        <div class="flex items-center gap-3 text-sm text-slate-500">
          <span class="h-3 w-3 animate-pulse rounded-full bg-sky-500"></span>
          Vérification de la session Neon Auth
        </div>
      }
    </div>
  </section>
</main>
